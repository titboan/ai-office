# railway.toml
#
# Вариант A (рекомендуется): один сервис — все 6 агентов в одном процессе.
#   AGENT_NAME не задаётся — main.py запускает всех через asyncio.
#
# Вариант B: 6 отдельных сервисов, каждый с AGENT_NAME=<имя>.
#   Преимущество: изолированные логи и рестарты.

[build]
builder        = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Polling-бот не поднимает HTTP — healthcheck отключён намеренно.
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 5
